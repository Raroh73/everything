name: Check Pull Request
on:
  pull_request:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Run Check
        run: nix develop --command python manage.py check
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Run Ruff
        run: nix develop --command ruff check
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Run Test
        run: nix develop --command python manage.py test
