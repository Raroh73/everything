name: Check Push
on:
  push:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Run Check
        run: nix develop --command python manage.py check
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Run Ruff
        run: nix develop --command ruff check
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Run Test
        run: nix develop --command python manage.py test
  coverage:
    runs-on: ubuntu-latest
    needs: [check, ruff, test]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Generate Coverage
        run: nix develop --command coverage run --source . manage.py test
      - name: Generate HTML
        run: nix develop --command coverage html --directory coverage
      - name: Setup Pages
        uses: actions/configure-pages@v5.0.0
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: "coverage"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
